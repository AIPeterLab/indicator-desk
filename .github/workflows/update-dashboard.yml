name: Update technical bear breadth dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "17 22 * * 1-5"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Refresh indicator data
        run: python scripts/update_technical_bear_breadth.py --sleep 0.05
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/technical_bear_summary.csv data/technical_bear_summary.json data/technical_bear_meta.json
          git diff --cached --quiet && exit 0
          git commit -m "Refresh technical bear breadth data"
          git push
